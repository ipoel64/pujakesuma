name: pujakesuma_mobile
description: "A mobile application for PUJAKESUMA data collection se-Kota Binjai with OCR and offline-first capabilities."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.1

  # Backend & Auth
  supabase_flutter: ^2.5.4

  # Local DB for Offline Mode
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Hardware Integration (Camera, GPS, Connectivity)
  camera: ^0.11.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  image_picker: ^1.1.0
  image_cropper: ^8.0.0
  connectivity_plus: ^6.0.3

  # OCR Engine
  google_mlkit_text_recognition: ^0.13.0

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.11.1

  # UI & Styling
  flutter_chat_ui: ^1.6.14
  intl: ^0.19.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/data/suku_indonesia.json
